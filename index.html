<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divisor de PDF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    header svg { flex-shrink: 0; }
    header h1 { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.5px; }
    header p { font-size: 0.82rem; opacity: 0.65; margin-top: 2px; }

    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* Upload zone */
    #upload-zone {
      border: 2.5px dashed #94a3b8;
      border-radius: 16px;
      background: #fff;
      padding: 56px 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #upload-zone:hover, #upload-zone.drag-over {
      border-color: #4f46e5;
      background: #eef2ff;
    }
    #upload-zone svg { color: #94a3b8; margin-bottom: 16px; }
    #upload-zone h2 { font-size: 1.1rem; color: #374151; margin-bottom: 6px; }
    #upload-zone p { font-size: 0.875rem; color: #6b7280; }
    #file-input { display: none; }
    #upload-btn {
      margin-top: 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #upload-btn:hover { background: #4338ca; }

    /* Toolbar */
    #toolbar {
      display: none;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      background: #fff;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    #toolbar.visible { display: flex; }
    #file-info { display: flex; align-items: center; gap: 10px; }
    #file-info svg { color: #ef4444; }
    #file-name { font-weight: 600; font-size: 0.95rem; }
    #page-count { font-size: 0.82rem; color: #6b7280; }

    .toolbar-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .legend { display: flex; gap: 16px; font-size: 0.82rem; align-items: center; }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; }
    .legend-dot.comp { background: #4f46e5; }
    .legend-dot.aa   { background: #059669; }
    .legend-dot.none { background: #e5e7eb; border: 1px solid #d1d5db; }

    /* Download buttons */
    .dl-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .dl-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
    .dl-btn:not(:disabled):hover { opacity: 0.88; transform: translateY(-1px); }
    .dl-btn.comp { background: #4f46e5; color: #fff; }
    .dl-btn.aa   { background: #059669; color: #fff; }

    #change-file {
      background: none;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.82rem;
      cursor: pointer;
      color: #374151;
      transition: border-color 0.2s;
    }
    #change-file:hover { border-color: #6b7280; }

    /* Instructions */
    #instructions {
      display: none;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #92400e;
      margin-bottom: 20px;
    }
    #instructions.visible { display: block; }

    /* Pages grid */
    #pages-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(480px, 1fr));
      gap: 28px;
    }

    .page-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border: 3px solid transparent;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      transition: border-color 0.18s, box-shadow 0.18s;
      position: relative;
    }
    .page-card.comp { border-color: #4f46e5; box-shadow: 0 0 0 1px #4f46e5, 0 4px 12px rgba(79,70,229,0.15); }
    .page-card.aa   { border-color: #059669; box-shadow: 0 0 0 1px #059669, 0 4px 12px rgba(5,150,105,0.15); }

    .badge {
      display: none;
      position: absolute;
      top: -10px;
      right: -10px;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .page-card.comp .badge { display: block; background: #4f46e5; }
    .page-card.aa   .badge { display: block; background: #059669; }

    .page-canvas-wrap {
      width: 100%;
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
      border: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 280px;
      cursor: zoom-in;
      position: relative;
    }
    .page-canvas-wrap canvas { max-width: 100%; display: block; }
    .zoom-hint {
      position: absolute;
      bottom: 6px;
      right: 6px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 0.68rem;
      padding: 3px 7px;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .page-canvas-wrap:hover .zoom-hint { opacity: 1; }

    /* Modal */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
      overflow-y: auto;
    }
    #modal-overlay.open { display: flex; }
    #modal-box {
      background: #fff;
      border-radius: 14px;
      width: min(860px, 96vw);
      margin: auto;
      position: relative;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    }
    #modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-shrink: 0;
    }
    #modal-title { font-weight: 700; font-size: 1rem; color: #1a1a2e; }
    #modal-nav { display: flex; align-items: center; gap: 8px; }
    .modal-nav-btn {
      background: #f3f4f6;
      border: none;
      border-radius: 6px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .modal-nav-btn:hover:not(:disabled) { background: #e5e7eb; }
    .modal-nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #modal-close {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      border-radius: 8px;
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #modal-close:hover { background: #fca5a5; }
    #modal-canvas-wrap {
      display: flex;
      justify-content: center;
      background: #f1f5f9;
      border-radius: 8px;
      padding: 12px;
    }
    #modal-canvas-wrap canvas {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.18);
      background: #fff;
    }
    #modal-assign {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-shrink: 0;
    }
    .modal-assign-btn {
      flex: 1;
      max-width: 180px;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 10px 0;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.5px;
    }
    .modal-assign-btn.comp-btn {
      background: #eef2ff; color: #4f46e5; border-color: #c7d2fe;
    }
    .modal-assign-btn.comp-btn.active,
    .modal-assign-btn.comp-btn:hover {
      background: #4f46e5; color: #fff; border-color: #4f46e5;
    }
    .modal-assign-btn.aa-btn {
      background: #ecfdf5; color: #059669; border-color: #a7f3d0;
    }
    .modal-assign-btn.aa-btn.active,
    .modal-assign-btn.aa-btn:hover {
      background: #059669; color: #fff; border-color: #059669;
    }

    .page-num {
      font-size: 0.78rem;
      color: #6b7280;
      font-weight: 500;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      width: 100%;
    }
    .btn-group button {
      flex: 1;
      border: 2px solid transparent;
      border-radius: 6px;
      padding: 6px 0;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      letter-spacing: 0.5px;
    }
    .btn-assign-comp {
      background: #eef2ff;
      color: #4f46e5;
      border-color: #c7d2fe;
    }
    .btn-assign-comp:hover, .page-card.comp .btn-assign-comp {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }
    .btn-assign-aa {
      background: #ecfdf5;
      color: #059669;
      border-color: #a7f3d0;
    }
    .btn-assign-aa:hover, .page-card.aa .btn-assign-aa {
      background: #059669;
      color: #fff;
      border-color: #059669;
    }

    /* Loading spinner */
    #loading {
      display: none;
      text-align: center;
      padding: 48px;
      color: #6b7280;
      font-size: 0.9rem;
    }
    #loading.visible { display: block; }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Counter */
    #counters {
      display: none;
      gap: 8px;
      font-size: 0.8rem;
      align-items: center;
    }
    #counters.visible { display: flex; }
    .counter-tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .counter-tag.comp { background: #eef2ff; color: #4f46e5; }
    .counter-tag.aa   { background: #ecfdf5; color: #059669; }

    @media (max-width: 640px) {
      header { padding: 14px 16px; }
      main { padding: 20px 12px; }
      #pages-container { grid-template-columns: 1fr; gap: 16px; }
      #modal-box { padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/><line x1="9" y1="11" x2="15" y2="11"/>
  </svg>
  <div>
    <h1>Divisor de PDF</h1>
    <p>Selecciona páginas y genera archivos COMP y AA</p>
  </div>
</header>

<main>

  <!-- Upload zone -->
  <div id="upload-zone">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <h2>Arrastra tu PDF aquí</h2>
    <p>o haz clic para seleccionar el archivo</p>
    <button id="upload-btn">Seleccionar PDF</button>
    <input type="file" id="file-input" accept="application/pdf">
  </div>

  <!-- Toolbar -->
  <div id="toolbar">
    <div id="file-info">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
      </svg>
      <div>
        <div id="file-name">—</div>
        <div id="page-count">—</div>
      </div>
    </div>

    <div class="toolbar-actions">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot none"></div> Sin asignar</div>
        <div class="legend-item"><div class="legend-dot comp"></div> COMP</div>
        <div class="legend-item"><div class="legend-dot aa"></div> AA</div>
      </div>

      <div id="counters">
        <span class="counter-tag comp" id="count-comp">COMP: 0</span>
        <span class="counter-tag aa"   id="count-aa">AA: 0</span>
      </div>

      <button class="dl-btn comp" id="dl-comp" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar COMP
      </button>
      <button class="dl-btn aa" id="dl-aa" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar AA
      </button>
      <button id="change-file">Cambiar archivo</button>
    </div>
  </div>

  <!-- Instructions -->
  <div id="instructions">
    💡 Haz clic en <strong>COMP</strong> o <strong>AA</strong> debajo de cada página para asignarla. Haz clic de nuevo para quitar la asignación.
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <div>Cargando páginas…</div>
  </div>

  <!-- Pages grid -->
  <div id="pages-container"></div>

</main>

<!-- Modal de previsualización -->
<div id="modal-overlay">
  <div id="modal-box">
    <div id="modal-header">
      <span id="modal-title">Página 1</span>
      <div id="modal-nav">
        <button class="modal-nav-btn" id="modal-prev" title="Anterior">&#8592;</button>
        <button class="modal-nav-btn" id="modal-next" title="Siguiente">&#8594;</button>
      </div>
      <button id="modal-close" title="Cerrar">&#10005;</button>
    </div>
    <div id="modal-canvas-wrap">
      <canvas id="modal-canvas"></canvas>
    </div>
    <div id="modal-assign">
      <button class="modal-assign-btn comp-btn" id="modal-btn-comp">COMP</button>
      <button class="modal-assign-btn aa-btn"   id="modal-btn-aa">AA</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfJsDoc    = null;
  let rawBytes    = null;
  let baseName    = '';
  let assignments = []; // 'comp' | 'aa' | null per page (0-indexed)
  let modalPage   = 0;  // current page shown in modal (0-indexed)

  // ── Elements ──────────────────────────────────────────────────────────────
  const uploadZone     = document.getElementById('upload-zone');
  const fileInput      = document.getElementById('file-input');
  const uploadBtn      = document.getElementById('upload-btn');
  const toolbar        = document.getElementById('toolbar');
  const fileNameEl     = document.getElementById('file-name');
  const pageCountEl    = document.getElementById('page-count');
  const pagesContainer = document.getElementById('pages-container');
  const loadingEl      = document.getElementById('loading');
  const instructions   = document.getElementById('instructions');
  const counters       = document.getElementById('counters');
  const countComp      = document.getElementById('count-comp');
  const countAA        = document.getElementById('count-aa');
  const dlComp         = document.getElementById('dl-comp');
  const dlAA           = document.getElementById('dl-aa');
  const changeFile     = document.getElementById('change-file');

  const modalOverlay   = document.getElementById('modal-overlay');
  const modalTitle     = document.getElementById('modal-title');
  const modalCanvas    = document.getElementById('modal-canvas');
  const modalPrev      = document.getElementById('modal-prev');
  const modalNext      = document.getElementById('modal-next');
  const modalClose     = document.getElementById('modal-close');
  const modalBtnComp   = document.getElementById('modal-btn-comp');
  const modalBtnAA     = document.getElementById('modal-btn-aa');

  // ── Upload events ──────────────────────────────────────────────────────────
  uploadBtn.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('click', e => { if (e.target === uploadZone) fileInput.click(); });
  fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') handleFile(file);
  });

  changeFile.addEventListener('click', () => { fileInput.value = ''; fileInput.click(); });

  // ── Download ───────────────────────────────────────────────────────────────
  dlComp.addEventListener('click', () => generateAndDownload('comp'));
  dlAA  .addEventListener('click', () => generateAndDownload('aa'));

  // ── Modal events ──────────────────────────────────────────────────────────
  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', e => {
    if (!modalOverlay.classList.contains('open')) return;
    if (e.key === 'Escape')      closeModal();
    if (e.key === 'ArrowLeft')   navigateModal(-1);
    if (e.key === 'ArrowRight')  navigateModal(+1);
  });
  modalPrev.addEventListener('click', () => navigateModal(-1));
  modalNext.addEventListener('click', () => navigateModal(+1));
  modalBtnComp.addEventListener('click', () => { toggleAssign(modalPage, 'comp'); refreshModalButtons(); });
  modalBtnAA  .addEventListener('click', () => { toggleAssign(modalPage, 'aa');   refreshModalButtons(); });

  function openModal(idx) {
    modalPage = idx;
    modalOverlay.classList.add('open');
    renderModalPage();
  }
  function closeModal() {
    modalOverlay.classList.remove('open');
  }
  function navigateModal(dir) {
    const next = modalPage + dir;
    if (next >= 0 && next < pdfJsDoc.numPages) {
      modalPage = next;
      renderModalPage();
    }
  }
  async function renderModalPage() {
    const n = pdfJsDoc.numPages;
    modalTitle.textContent = `Página ${modalPage + 1} de ${n}`;
    modalPrev.disabled = modalPage === 0;
    modalNext.disabled = modalPage === n - 1;
    refreshModalButtons();

    const page     = await pdfJsDoc.getPage(modalPage + 1);
    const viewport = page.getViewport({ scale: 2.4 });
    modalCanvas.width  = viewport.width;
    modalCanvas.height = viewport.height;
    await page.render({ canvasContext: modalCanvas.getContext('2d'), viewport }).promise;
  }
  function refreshModalButtons() {
    const g = assignments[modalPage];
    modalBtnComp.classList.toggle('active', g === 'comp');
    modalBtnAA  .classList.toggle('active', g === 'aa');
  }

  // ── Core ───────────────────────────────────────────────────────────────────
  async function handleFile(file) {
    baseName = file.name.replace(/\.pdf$/i, '');
    fileNameEl.textContent  = file.name;
    pageCountEl.textContent = 'Cargando…';

    uploadZone.style.display = 'none';
    loadingEl.classList.add('visible');
    pagesContainer.innerHTML = '';
    toolbar.classList.remove('visible');
    instructions.classList.remove('visible');
    counters.classList.remove('visible');

    rawBytes = await file.arrayBuffer();
    pdfJsDoc = await pdfjsLib.getDocument({ data: rawBytes.slice() }).promise;

    const n = pdfJsDoc.numPages;
    pageCountEl.textContent = `${n} página${n !== 1 ? 's' : ''}`;
    assignments = new Array(n).fill(null);

    await renderThumbnails(n);

    loadingEl.classList.remove('visible');
    toolbar.classList.add('visible');
    instructions.classList.add('visible');
    counters.classList.add('visible');
    updateCounters();
  }

  async function renderThumbnails(n) {
    for (let i = 1; i <= n; i++) {
      const page     = await pdfJsDoc.getPage(i);
      const viewport = page.getViewport({ scale: 0.9 });
      const canvas   = document.createElement('canvas');
      canvas.width   = viewport.width;
      canvas.height  = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

      const card = buildCard(canvas, i);
      pagesContainer.appendChild(card);
    }
  }

  function buildCard(canvas, pageNum) {
    const idx = pageNum - 1;

    const card = document.createElement('div');
    card.className = 'page-card';
    card.id = `card-${idx}`;

    const badge = document.createElement('div');
    badge.className = 'badge';
    badge.id = `badge-${idx}`;
    card.appendChild(badge);

    const wrap = document.createElement('div');
    wrap.className = 'page-canvas-wrap';
    wrap.appendChild(canvas);

    const hint = document.createElement('div');
    hint.className = 'zoom-hint';
    hint.textContent = '🔍 Ver ampliado';
    wrap.appendChild(hint);
    wrap.addEventListener('click', () => openModal(idx));

    card.appendChild(wrap);

    const num = document.createElement('div');
    num.className = 'page-num';
    num.textContent = `Página ${pageNum}`;
    card.appendChild(num);

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group';

    const bComp = document.createElement('button');
    bComp.className = 'btn-assign-comp';
    bComp.textContent = 'COMP';
    bComp.addEventListener('click', () => toggleAssign(idx, 'comp'));

    const bAA = document.createElement('button');
    bAA.className = 'btn-assign-aa';
    bAA.textContent = 'AA';
    bAA.addEventListener('click', () => toggleAssign(idx, 'aa'));

    btnGroup.appendChild(bComp);
    btnGroup.appendChild(bAA);
    card.appendChild(btnGroup);

    return card;
  }

  function toggleAssign(idx, group) {
    assignments[idx] = assignments[idx] === group ? null : group;
    refreshCard(idx);
    updateCounters();
  }

  function refreshCard(idx) {
    const card  = document.getElementById(`card-${idx}`);
    const badge = document.getElementById(`badge-${idx}`);
    const g     = assignments[idx];
    card.className    = `page-card${g ? ' ' + g : ''}`;
    badge.textContent = g ? g.toUpperCase() : '';
  }

  function updateCounters() {
    const nComp = assignments.filter(a => a === 'comp').length;
    const nAA   = assignments.filter(a => a === 'aa'  ).length;
    countComp.textContent = `COMP: ${nComp}`;
    countAA  .textContent = `AA: ${nAA}`;
    dlComp.disabled = nComp === 0;
    dlAA  .disabled = nAA   === 0;
  }

  async function generateAndDownload(group) {
    const pages = assignments
      .map((a, i) => a === group ? i : -1)
      .filter(i => i >= 0);

    if (pages.length === 0) return;

    const srcDoc  = await PDFLib.PDFDocument.load(rawBytes.slice());
    const newDoc  = await PDFLib.PDFDocument.create();
    const copied  = await newDoc.copyPages(srcDoc, pages);
    copied.forEach(p => newDoc.addPage(p));

    const pdfBytes = await newDoc.save();
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${baseName} ${group.toUpperCase()}.pdf`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
  }
</script>
</body>
</html>
